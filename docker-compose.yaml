# Settings and configurations that are common for all containers
x-minio-common: &minio-common
  image: quay.io/minio/minio:RELEASE.2023-09-23T03-47-50Z
  command: server --console-address ":9001" /imgs
  expose:
    - "9000"
    - "9001"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    interval: 5s
    timeout: 5s
    retries: 5

# starts 4 docker containers running minio server instances.
# using nginx reverse proxy, load balancing, you can access
# it through port 9000.
services:
  db:
    image: postgres:17
    environment:
      POSGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
  miniobucket:
    <<: *minio-common
    hostname: miniobucket
    volumes:
      - haichi-images:/imgs
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    env_file:
      - .env
  django-web:
    build: ./Django/HaichiAPI
    container_name: haichiAPI-django-docker
    ports:
    - "8000:8000"
    depends_on:
      - db
      - miniobucket
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_ENGINE: ${DATABASE_ENGINE}
      DATABASE_NAME: ${POSTGRES_DB_NAME}
      DATABASE_USERNAME: ${POSTGRES_USERNAME}

      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  react-frontend:
    build: ./React/haichi
    container_name: haichi-react-frontend
    ports:
      - "80:80"
    depends_on:
      - django-web

  nginx:
    image: nginx:1.19.2-alpine
    hostname: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    depends_on:
      - miniobucket

## By default this config uses default local driver,
## For custom volumes replace with volume driver configuration.
volumes:
  haichi-images:
  postgres_data: